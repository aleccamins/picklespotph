<!DOCTYPE html>
<html>
<head>
  <title>Select Role</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family:Arial;
      background:#f4f6f9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box {
      background:white;
      padding:25px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      color:white;
      font-weight:bold;
    }

    .player { background:#2ecc71; }
    .owner { background:#3498db; }
  </style>
</head>

<body>

<div class="box">
  <h3>Select Role</h3>

  <button class="player" onclick="goPlayer()">I am a Player</button>
  <button class="owner" onclick="goOwner()">I am an Owner</button>
</div>

<script>
function goPlayer() {
  window.location.href = "player.html";
}

function goOwner() {
  window.location.href = "owner.html";
}
</script>

</body>
</html>
