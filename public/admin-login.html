<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e74c3c;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h3>Admin Login</h3>

  <input id="email" placeholder="Admin Email">

  <button onclick="login()">Login</button>
</div>

<script>
const admins = [
  "alec.camins@gmail.com",
  "admin2@email.com",
  "admin3@email.com",
  "admin4@email.com",
  "admin5@email.com",
  "admin6@email.com"
];

function login() {
  const email = document.getElementById("email").value;

  if (admins.includes(email)) {
    localStorage.setItem("admin", email);
    window.location.href = "dashboard.html";
  } else {
    alert("Not authorized");
  }
}
</script>

</body>
</html>
