<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .hero {
      height:100vh;
      background:url('images/cover.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.6));
    }

    /* 🔥 FIXED GLASS CARD */
    .glass {
      position:relative;
      z-index:2;
      padding:25px 20px;
      border-radius:18px;

      width:90%;
      max-width:320px; /* 👈 KEY FIX */

      text-align:center;

      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);

      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    .logo {
      width:70px;
      border-radius:50%;
      margin-bottom:10px;
    }

    h2 {
      color:white;
      margin-bottom:15px;
      font-size:20px;
    }

    input {
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:none;
      outline:none;
      font-size:14px;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#e74c3c;
      color:white;
      font-weight:bold;
      font-size:14px;
      cursor:pointer;
    }

    .note {
      font-size:12px;
      color:#ccc;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="glass">
    <img src="images/logo.jpg" class="logo">

    <h2>Admin Login</h2>

    <input id="email" placeholder="Admin Email">

    <button onclick="login()">Login</button>

    <div class="note">Authorized admins only</div>
  </div>
</div>

<script>
const admins = [
  "alec.camins@gmail.com",
  "admin2@email.com",
  "admin3@email.com",
  "admin4@email.com",
  "admin5@email.com",
  "admin6@email.com"
];

function login() {
  const email = document.getElementById("email").value;

  if (admins.includes(email)) {
    localStorage.setItem("admin", email);
    window.location.href = "dashboard.html";
  } else {
    alert("Access denied");
  }
}
</script>

</body>
</html>
