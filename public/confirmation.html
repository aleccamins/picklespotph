<!DOCTYPE html>
<html>
<head>
  <title>Booking Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box {
      background:white;
      padding:25px;
      border-radius:12px;
      text-align:center;
      max-width:320px;
    }

    h2 { color:#2ecc71; }

    button {
      margin-top:15px;
      padding:12px;
      width:100%;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>✅ Booking Confirmed</h2>

  <p id="details"></p>

  <button onclick="goHome()">Book Again</button>
  <button onclick="goHistory()">View My Bookings</button>
</div>

<script>
const data = JSON.parse(localStorage.getItem("lastBooking"));

document.getElementById("details").innerText =
  `${data.date} at ${data.time} (${data.duration} hr)`;

function goHome() {
  window.location.href = "player.html";
}

function goHistory() {
  window.location.href = "history.html";
}
</script>

</body>
</html>
