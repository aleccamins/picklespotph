<!DOCTYPE html>
<html>
<head>
  <title>Booking Confirmed - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .hero {
      height:100vh;
      background:url('images/cover.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.6));
    }

    .glass {
      position:relative;
      z-index:2;
      padding:25px;
      border-radius:20px;
      width:90%;
      max-width:350px;
      text-align:center;

      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }

    .logo {
      width:70px;
      border-radius:50%;
      margin-bottom:10px;
    }

    h2 {
      color:#2ecc71;
      margin-bottom:10px;
    }

    p {
      color:white;
      font-size:14px;
    }

    .details {
      background:rgba(255,255,255,0.1);
      padding:10px;
      border-radius:10px;
      margin-top:15px;
      color:white;
      font-size:13px;
      text-align:left;
    }

    button {
      margin-top:15px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2ecc71;
      color:white;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="glass">
    <img src="images/logo.jpg" class="logo">

    <h2>✅ Booking Confirmed</h2>
    <p>Your court has been successfully reserved.</p>

    <div class="details" id="details"></div>

    <button onclick="goHome()">Back to Home</button>
  </div>
</div>

<script>
const booking = JSON.parse(localStorage.getItem("lastBooking"));

if (booking) {
  document.getElementById("details").innerHTML = `
    <b>Court:</b> ${booking.court}<br>
    <b>Date:</b> ${booking.date}<br>
    <b>Time:</b> ${booking.time}<br>
    <b>Duration:</b> ${booking.duration} hour(s)
  `;
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
