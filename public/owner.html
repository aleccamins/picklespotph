<!DOCTYPE html>
<html>
<head>
  <title>Owner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family:Arial; background:#f4f6f9; margin:0; }
    header { background:#2ecc71; color:white; padding:15px; text-align:center; }

    .container {
      max-width:400px;
      margin:30px auto;
      padding:15px;
    }

    .card {
      background:white;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    button {
      width:48%;
      padding:8px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .approve { background:#2ecc71; color:white; }
    .reject { background:#e74c3c; color:white; }
  </style>
</head>

<body>

<header>Owner Dashboard</header>

<div class="container">
  <div id="bookings"></div>
</div>

<script>
const court = localStorage.getItem("court");

if (!court) {
  alert("Please login");
  window.location.href = "login.html";
}

async function loadBookings() {
  const res = await fetch("/bookings");
  const data = await res.json();

  const filtered = data.filter(b => b.courtName === court);

  const container = document.getElementById("bookings");
  container.innerHTML = "";

  if (filtered.length === 0) {
    container.innerHTML = "<p>No bookings</p>";
    return;
  }

  filtered.forEach(b => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div><b>${b.user}</b></div>
      <div>${b.date}</div>
      <div>${b.time}</div>
      <div>${b.duration} hr</div>
      <div>Status: ${b.status}</div>

      <button class="approve" onclick="approve('${b.id}')">Approve</button>
      <button class="reject" onclick="reject('${b.id}')">Reject</button>
    `;

    container.appendChild(div);
  });
}

async function approve(id) {
  await fetch(`/approve/${id}`, { method:"POST" });
  loadBookings();
}

async function reject(id) {
  await fetch(`/reject/${id}`, { method:"POST" });
  loadBookings();
}

setInterval(loadBookings, 5000);
loadBookings();
</script>

</body>
</html>
