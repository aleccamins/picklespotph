<!DOCTYPE html>
<html>
<head>
  <title>Player - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#3498db; color:white; padding:15px; text-align:center; }

    .container {
      max-width: 380px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    label { font-size:13px; display:block; margin-top:10px; }
    input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc; }

    .slots {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin-top:10px;
    }

    .slot {
      padding:8px;
      background:#ecf0f1;
      border-radius:6px;
      text-align:center;
      cursor:pointer;
      font-size:12px;
    }

    .slot.disabled { background:#ddd; color:#999; cursor:not-allowed; }
    .slot.selected { background:#3498db; color:white; }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#3498db;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>Player Dashboard</header>

<div class="container">

  <label>Select Court</label>
  <select id="court" onchange="loadSlots()"></select>

  <label>Name</label>
  <input id="name">

  <label>Date</label>
  <input type="date" id="date" onchange="loadSlots()">

  <label>Duration</label>
  <select id="duration" onchange="loadSlots()">
    <option value="1">1 Hour</option>
    <option value="2">2 Hours</option>
    <option value="3">3 Hours</option>
    <option value="4">4 Hours</option>
  </select>

  <label>Select Time</label>
  <div id="slots" class="slots"></div>

  <button onclick="book()">Book Court</button>

</div>

<script>
let selectedTime = "";

async function loadCourts() {
  const res = await fetch("/courts");
  const courts = await res.json();
  const select = document.getElementById("court");

  select.innerHTML = "";
  courts.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.innerText = c.name;
    select.appendChild(opt);
  });

  loadSlots();
}

function generateTimes() {
  const times = [];
  for (let h = 8; h <= 22; h++) {
    let hour = h % 12 || 12;
    let ampm = h >= 12 ? "PM" : "AM";
    times.push({ label: `${hour}:00 ${ampm}`, minutes: h*60 });
  }
  return times;
}

function toMinutes(timeStr) {
  let [t, mod] = timeStr.split(" ");
  let [h,m] = t.split(":");

  h = parseInt(h);
  m = parseInt(m);

  if (mod==="PM" && h!==12) h+=12;
  if (mod==="AM" && h===12) h=0;

  return h*60+m;
}

async function loadSlots() {
  const date = document.getElementById("date").value;
  const court = document.getElementById("court").value;
  const duration = parseInt(document.getElementById("duration").value);

  if (!date || !court) return;

  const res = await fetch("/bookings");
  const bookings = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  const times = generateTimes();

  times.forEach(t => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = t.label;

    const newStart = t.minutes;
    const newEnd = newStart + duration*60;

    const overlap = bookings.some(b => {
      if (b.date !== date) return false;
      if (b.courtName !== court) return false;

      const s = toMinutes(b.time);
      const e = s + (parseInt(b.duration||1)*60);

      return newStart < e && newEnd > s;
    });

    if (overlap) {
      div.classList.add("disabled");
    } else {
      div.onclick = () => {
        selectedTime = t.label;
        document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));
        div.classList.add("selected");
      };
    }

    container.appendChild(div);
  });
}

async function book() {
  const user = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const court = document.getElementById("court").value;
  const duration = document.getElementById("duration").value;

  if (!user || !date || !selectedTime) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName: court,
      user,
      date,
      time: selectedTime,
      duration
    })
  });

  alert(await res.text());
  loadSlots();
}

loadCourts();
</script>

</body>
</html>
