<!DOCTYPE html>
<html>
<head>
  <title>Book Court</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Book Court</h2>

<input id="name" placeholder="Your Name"><br><br>
<input type="date" id="date"><br><br>
<input id="time" placeholder="Time (e.g. 5:00 PM)"><br><br>

<label>Upload Payment Screenshot</label><br>
<input type="file" id="proof"><br><br>

<button onclick="book()">Submit Booking</button>

<script>
async function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function book() {
  const file = document.getElementById("proof").files[0];
  if (!file) {
    alert("Upload payment proof");
    return;
  }

  const proof = await toBase64(file);

  const res = await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName: "Default Court",
      user: document.getElementById("name").value,
      date: document.getElementById("date").value,
      time: document.getElementById("time").value,
      duration: 1,
      proof
    })
  });

  alert(await res.text());
}
</script>

</body>
</html>
