<!DOCTYPE html>
<html>
<head>
  <title>Player - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #3498db;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 380px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #555;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 13px;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .slots {
      margin-top: 15px;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }

    .slot {
      padding: 6px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>

<header>Player Dashboard</header>

<div class="container">

  <div class="section">
    <label>Name</label>
    <input id="name">
  </div>

  <div class="section">
    <label>Select Date</label>
    <input type="date" id="date" onchange="loadSlots()">
  </div>

  <div class="section">
    <label>Select Time</label>
    <input type="time" id="time">
  </div>

  <div class="section">
    <label>Duration</label>
    <select id="duration">
      <option value="1">1 Hour</option>
      <option value="2">2 Hours</option>
      <option value="3">3 Hours</option>
      <option value="4">4 Hours</option>
      <option value="5">5 Hours</option>
      <option value="6">6 Hours</option>
      <option value="7">7 Hours</option>
      <option value="8">8 Hours</option>
      <option value="9">9 Hours</option>
      <option value="10">10 Hours</option>
      <option value="11">11 Hours</option>
      <option value="12">12 Hours</option>
    </select>
  </div>

  <button onclick="book()">Book Court</button>

  <!-- AVAILABLE SLOTS -->
  <div class="slots" id="slots">
    Available slots will appear here
  </div>

</div>

<script>
function formatTime(time) {
  let [hour, minute] = time.split(":");
  hour = parseInt(hour);

  let ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;

  return `${hour}:${minute} ${ampm}`;
}

// LOAD EXISTING BOOKINGS
async function loadSlots() {
  const date = document.getElementById("date").value;
  if (!date) return;

  const res = await fetch("/bookings");
  const bookings = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "<b>Booked Slots:</b><br>";

  const filtered = bookings.filter(b => b.date === date);

  if (filtered.length === 0) {
    container.innerHTML += "No bookings yet ✅";
    return;
  }

  filtered.forEach(b => {
    container.innerHTML += `
      <div class="slot">
        ${b.time} (${b.duration} hr)
      </div>
    `;
  });
}

// BOOK FUNCTION
async function book() {
  const user = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const duration = document.getElementById("duration").value;

  if (!user || !date || !time) {
    alert("Please fill all fields");
    return;
  }

  const formattedTime = formatTime(time);

  const res = await fetch("/book", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      courtName: "Cebu Pickle Court",
      user,
      date,
      time: formattedTime,
      duration
    })
  });

  const msg = await res.text();
  alert(msg);

  loadSlots(); // refresh slots
}
</script>

</body>
</html>
