<!DOCTYPE html>
<html>
<head>
  <title>Player - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #3498db;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>Player Dashboard</header>

<div class="container">
  <input id="name" placeholder="Your Name">
  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Book Court</button>

  <div id="courts"></div>
</div>

<script src="player.js"></script>

</body>
</html>
