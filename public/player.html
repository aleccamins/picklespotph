<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f4f6f9; }

    .app { max-width:420px; margin:auto; background:#fff; }

    .header { background:#3498db; color:white; padding:15px; text-align:center; }

    .content { padding:15px; }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
    }

    label { font-size:13px; margin-bottom:5px; display:block; }

    input, select {
      width:100%;
      padding:10px;
      border-radius:6px;
      border:1px solid #ccc;
      margin-bottom:10px;
    }

    .price {
      font-size:18px;
      font-weight:bold;
      color:#2ecc71;
      margin-top:5px;
    }

    .footer { padding:15px; }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
    }
  </style>
</head>

<body>

<div class="app">

<div class="header">Book Court</div>

<div class="content">

  <div class="card">
    <label>Name</label>
    <input id="name">

    <label>Date</label>
    <input type="date" id="date">

    <label>Time</label>
    <input id="time" placeholder="e.g. 5:00 PM">

    <label>Duration</label>
    <select id="duration" onchange="calcPrice()">
      <option value="1">1 Hour</option>
      <option value="2">2 Hours</option>
      <option value="3">3 Hours</option>
    </select>

    <div class="price" id="price">₱100</div>
  </div>

  <div class="card">
    <label>GCash Payment</label>
    <b>0912 345 6789</b><br>
    Name: PickleSpotPH<br><br>

    <input type="file" id="proof">
  </div>

</div>

<div class="footer">
  <button onclick="book()">Submit Booking</button>
</div>

</div>

<script>
const RATE = 100;

function calcPrice() {
  const duration = document.getElementById("duration").value;
  const total = duration * RATE;
  document.getElementById("price").innerText = "₱" + total;
}

async function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

async function book() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const duration = document.getElementById("duration").value;
  const file = document.getElementById("proof").files[0];

  if (!name || !date || !time || !file) {
    alert("Complete all fields");
    return;
  }

  const total = duration * RATE;
  const proof = await toBase64(file);

  // SAVE RECEIPT DATA
  localStorage.setItem("receipt", JSON.stringify({
    name, date, time, duration, total
  }));

  await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName:"Default Court",
      user:name,
      date,
      time,
      duration,
      proof
    })
  });

  window.location.href = "receipt.html";
}
</script>

</body>
</html>
