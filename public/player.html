<!DOCTYPE html>
<html>
<head>
  <title>Player Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
    }

    label {
      font-size: 13px;
      margin-top: 10px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .slot {
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      background: #ecf0f1;
      font-size: 13px;
    }

    .slot.selected {
      background: #3498db;
      color: white;
    }

    .slot.disabled {
      background: #bdc3c7;
      color: #777;
      pointer-events: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 8px;
      font-size: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Book a Court</h2>

  <label>Your Name</label>
  <input id="name">

  <label>Select Date</label>
  <input type="date" id="date" onchange="loadSlots()">

  <label>Duration</label>
  <select id="duration">
    <option value="1">1 Hour</option>
    <option value="2">2 Hours</option>
    <option value="3">3 Hours</option>
  </select>

  <label>Available Time Slots</label>
  <div id="slots" class="slots"></div>

  <button onclick="book()">Book Court</button>

</div>

<script>
let selectedTime = "";

// GENERATE TIME SLOTS
const times = [
  "8:00 AM","9:00 AM","10:00 AM",
  "11:00 AM","12:00 PM","1:00 PM",
  "2:00 PM","3:00 PM","4:00 PM",
  "5:00 PM","6:00 PM","7:00 PM"
];

// LOAD AVAILABLE SLOTS
async function loadSlots() {
  const date = document.getElementById("date").value;
  if (!date) return;

  const res = await fetch("/bookings");
  const bookings = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  times.forEach(time => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;

    const taken = bookings.find(b =>
      b.date === date &&
      b.time === time &&
      b.status !== "Rejected"
    );

    if (taken) {
      div.classList.add("disabled");
    } else {
      div.onclick = () => selectSlot(div, time);
    }

    container.appendChild(div);
  });
}

// SELECT SLOT
function selectSlot(el, time) {
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  selectedTime = time;
}

// BOOK
async function book() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const duration = document.getElementById("duration").value;

  if (!name || !date || !selectedTime) {
    alert("Complete all fields");
    return;
  }

  const res = await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName: "Default Court",
      user: name,
      date,
      time: selectedTime,
      duration
    })
  });

  const msg = await res.text();
  alert(msg);

  loadSlots();
}
</script>

</body>
</html>
