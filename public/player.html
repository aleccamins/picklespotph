<!DOCTYPE html>
<html>
<head>
  <title>Player - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #3498db;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Player Dashboard</header>

<div class="container">
  <input id="name" placeholder="Your Name">
  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Book Court</button>
</div>

<script>
async function book() {
  const user = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if (!user || !date || !time) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch("/book", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      courtName: "Cebu Pickle Court",
      user,
      date,
      time
    })
  });

  const msg = await res.text();
  alert(msg);

  // clear fields
  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("time").value = "";
}
</script>

</body>
</html>
