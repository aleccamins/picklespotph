<!DOCTYPE html>
<html>
<head>
  <title>Book Court</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Book Court</h2>

<select id="court" onchange="updatePrice()"></select><br><br>

<input id="name" placeholder="Name"><br><br>
<input type="date" id="date"><br><br>
<input id="time" placeholder="Time"><br><br>

<select id="duration" onchange="updatePrice()">
  <option value="1">1 Hour</option>
  <option value="2">2 Hours</option>
  <option value="3">3 Hours</option>
</select><br><br>

<div id="price">₱0</div><br>

<input type="file" id="proof"><br><br>

<button onclick="book()">Submit</button>

<script>
let courts = [];
let rate = 100;

async function loadCourts() {
  const res = await fetch("/courts");
  courts = await res.json();

  const select = document.getElementById("court");

  courts.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.innerText = c.name;
    select.appendChild(opt);
  });

  updatePrice();
}

function updatePrice() {
  const selected = document.getElementById("court").value;
  const court = courts.find(c => c.name === selected);

  if (court) rate = court.price;

  const duration = document.getElementById("duration").value;
  const total = rate * duration;

  document.getElementById("price").innerText = "₱" + total;
}

async function toBase64(file) {
  return new Promise(r => {
    const reader = new FileReader();
    reader.onload = () => r(reader.result);
    reader.readAsDataURL(file);
  });
}

async function book() {
  const file = document.getElementById("proof").files[0];
  const proof = await toBase64(file);

  const duration = document.getElementById("duration").value;
  const total = rate * duration;

  localStorage.setItem("receipt", JSON.stringify({
    name: name.value,
    date: date.value,
    time: time.value,
    duration,
    total
  }));

  await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName: court.value,
      user: name.value,
      date: date.value,
      time: time.value,
      duration,
      proof
    })
  });

  window.location.href = "receipt.html";
}

loadCourts();
</script>

</body>
</html>
