<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f4f6f9;
    }

    .app {
      max-width: 420px;
      margin: auto;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #3498db;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    .content {
      padding: 16px;
      flex: 1;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .slot {
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      background: #ecf0f1;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slot:hover {
      transform: scale(1.03);
    }

    .slot.selected {
      background: #3498db;
      color: white;
      font-weight: bold;
    }

    .slot.disabled {
      background: #dcdde1;
      color: #888;
      pointer-events: none;
    }

    .footer {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
    }

    .book-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3498db;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .book-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    PickleSpotPH
  </div>

  <div class="content">

    <div class="card">
      <label>Your Name</label>
      <input id="name" placeholder="Enter your name">

      <label>Select Date</label>
      <input type="date" id="date" onchange="loadSlots()">

      <label>Duration</label>
      <select id="duration">
        <option value="1">1 Hour</option>
        <option value="2">2 Hours</option>
        <option value="3">3 Hours</option>
      </select>
    </div>

    <div class="card">
      <label>Available Time Slots</label>
      <div id="slots" class="slots"></div>
    </div>

  </div>

  <div class="footer">
    <button class="book-btn" onclick="book()">Book Court</button>
  </div>

</div>

<script>
let selectedTime = "";

const times = [
  "8:00 AM","9:00 AM","10:00 AM",
  "11:00 AM","12:00 PM","1:00 PM",
  "2:00 PM","3:00 PM","4:00 PM",
  "5:00 PM","6:00 PM","7:00 PM"
];

async function loadSlots() {
  const date = document.getElementById("date").value;
  if (!date) return;

  const res = await fetch("/bookings");
  const bookings = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  times.forEach(time => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;

    const taken = bookings.find(b =>
      b.date === date &&
      b.time === time &&
      b.status !== "Rejected"
    );

    if (taken) {
      div.classList.add("disabled");
    } else {
      div.onclick = () => selectSlot(div, time);
    }

    container.appendChild(div);
  });
}

function selectSlot(el, time) {
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
  selectedTime = time;
}

async function book() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const duration = document.getElementById("duration").value;

  if (!name || !date || !selectedTime) {
    alert("Complete all fields");
    return;
  }

  const res = await fetch("/book", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      courtName: "Default Court",
      user: name,
      date,
      time: selectedTime,
      duration
    })
  });

  const msg = await res.text();
  alert(msg);

  loadSlots();
}
</script>

</body>
</html>
