<!DOCTYPE html>
<html>
<head>
  <title>Player - PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #3498db;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 380px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .slot {
      padding: 8px;
      background: #ecf0f1;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
    }

    .slot.selected {
      background: #3498db;
      color: white;
    }

    .slot.disabled {
      background: #ddd;
      color: #999;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Player Dashboard</header>

<div class="container">

  <div class="section">
    <label>Name</label>
    <input id="name">
  </div>

  <div class="section">
    <label>Select Date</label>
    <input type="date" id="date" onchange="loadSlots()">
  </div>

  <div class="section">
    <label>Duration</label>
    <select id="duration" onchange="loadSlots()">
      <option value="1">1 Hour</option>
      <option value="2">2 Hours</option>
      <option value="3">3 Hours</option>
      <option value="4">4 Hours</option>
    </select>
  </div>

  <div class="section">
    <label>Select Time Slot</label>
    <div class="slots" id="slots"></div>
  </div>

  <button onclick="book()">Book Court</button>

</div>

<script>
let selectedTime = "";

function generateTimes() {
  const times = [];
  for (let h = 8; h <= 22; h++) {
    let hour = h % 12 || 12;
    let ampm = h >= 12 ? "PM" : "AM";
    times.push({
      label: `${hour}:00 ${ampm}`,
      minutes: h * 60
    });
  }
  return times;
}

function timeToMinutes(timeStr) {
  let [time, modifier] = timeStr.split(" ");
  let [h, m] = time.split(":");

  h = parseInt(h);
  m = parseInt(m);

  if (modifier === "PM" && h !== 12) h += 12;
  if (modifier === "AM" && h === 12) h = 0;

  return h * 60 + m;
}

async function loadSlots() {
  const date = document.getElementById("date").value;
  const duration = parseInt(document.getElementById("duration").value);

  if (!date) return;

  const res = await fetch("/bookings");
  const bookings = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  const times = generateTimes();

  times.forEach(t => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = t.label;

    const newStart = t.minutes;
    const newEnd = newStart + duration * 60;

    const overlap = bookings.some(b => {
      if (b.date !== date) return false;

      const bStart = timeToMinutes(b.time);
      const bEnd = bStart + (parseInt(b.duration || 1) * 60);

      return newStart < bEnd && newEnd > bStart;
    });

    if (overlap) {
      div.classList.add("disabled");
    } else {
      div.onclick = () => {
        selectedTime = t.label;
        document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
        div.classList.add("selected");
      };
    }

    container.appendChild(div);
  });
}

async function book() {
  const user = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const duration = document.getElementById("duration").value;

  if (!user || !date || !selectedTime) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/book", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      courtName: "Cebu Pickle Court",
      user,
      date,
      time: selectedTime,
      duration
    })
  });

  alert(await res.text());
  loadSlots();
}
</script>

</body>
</html>
