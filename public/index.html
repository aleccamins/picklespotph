<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background:#f4f6f9;
    }

    /* HERO */
    .hero {
      position:relative;
      height:100vh;
      background:url('images/cover.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5));
    }

    /* GLASS */
    .glass {
      position:relative;
      z-index:2;
      padding:25px;
      border-radius:20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      max-width:350px;

      /* ANIMATION */
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity:0;
        transform: translateY(30px);
      }
      to {
        opacity:1;
        transform: translateY(0);
      }
    }

    .logo {
      width:90px;
      border-radius:50%;
      margin-bottom:10px;
    }

    h1 {
      font-size:26px;
      margin:0;
      text-shadow:0 3px 10px rgba(0,0,0,0.8);
    }

    p {
      margin:10px 0 20px;
      font-size:14px;
      text-shadow:0 2px 8px rgba(0,0,0,0.8);
    }

    .buttons button {
      padding:12px;
      margin:5px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      width:100%;
    }

    .book-btn {
      background:#2ecc71;
      color:white;
    }

    .owner-btn {
      background:#3498db;
      color:white;
    }

    /* COURTS */
    .section {
      padding:20px;
      max-width:420px;
      margin:auto;
    }

    .court-card {
      background:white;
      border-radius:12px;
      margin-bottom:15px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);

      animation: fadeInUp 0.8s ease;
    }

    .court-img {
      width:100%;
      height:120px;
      object-fit:cover;
    }

    .content {
      padding:12px;
    }

    .price {
      color:#2ecc71;
      font-weight:bold;
    }

    .badge {
      font-size:11px;
      background:#eafaf1;
      color:#27ae60;
      padding:4px 6px;
      border-radius:6px;
      display:inline-block;
      margin-top:5px;
    }

    .card-btn {
      margin-top:10px;
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
      font-weight:bold;
    }

    /* 🔥 FLOATING BUTTON */
    .floating-btn {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#2ecc71;
      color:white;
      padding:14px 20px;
      border-radius:50px;
      font-weight:bold;
      box-shadow:0 6px 20px rgba(0,0,0,0.3);
      cursor:pointer;
      z-index:999;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="overlay"></div>

  <div class="glass">
    <img src="images/logo.jpg" class="logo">

    <h1>Book Courts. Play Anytime.</h1>
    <p>The easiest way to play pickleball in the Philippines 🇵🇭</p>

    <div class="buttons">
      <button class="book-btn" onclick="goPlayer()">🏓 Book Now</button>
      <button class="owner-btn" onclick="goOwner()">Owner Login</button>
    </div>
  </div>
</div>

<!-- COURTS -->
<div class="section">
  <h3>Available Courts Today</h3>
  <div id="courts"></div>
</div>

<!-- FLOATING CTA -->
<div class="floating-btn" onclick="goPlayer()">
  Book a Court
</div>

<script>
async function loadCourts() {
  const res = await fetch("/courts");
  const courts = await res.json();

  const bookingsRes = await fetch("/bookings");
  const bookings = await bookingsRes.json();

  const container = document.getElementById("courts");
  container.innerHTML = "";

  const today = new Date().toISOString().split("T")[0];

  courts.forEach(court => {
    const todayBookings = bookings.filter(b =>
      b.date === today &&
      b.courtName === court.name &&
      (b.status === "Paid" || b.status === "Approved")
    );

    const available = 12 - todayBookings.length;

    const card = document.createElement("div");
    card.className = "court-card";

    card.innerHTML = `
      <img class="court-img" src="images/cover.jpg">
      <div class="content">
        <b>${court.name}</b><br>
        <div class="price">₱${court.price}/hr</div>

        <div class="badge">
          ${available > 0 ? available + " slots available" : "Fully booked"}
        </div>

        <button class="card-btn" onclick="book('${court.name}')">
          Book Now
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

function goPlayer() {
  window.location.href = "player.html";
}

function goOwner() {
  window.location.href = "owner.html";
}

function book(court) {
  localStorage.setItem("selectedCourt", court);
  window.location.href = "player.html";
}

loadCourts();
</script>

</body>
</html>
