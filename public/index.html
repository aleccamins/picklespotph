<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .hero {
      height:100vh;
      background:url('images/cover.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
    }

    .glass {
      position:relative;
      z-index:2;
      padding:25px;
      border-radius:20px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      text-align:center;
    }

    button {
      margin-top:15px;
      padding:14px;
      width:100%;
      border:none;
      border-radius:10px;
      background:#2ecc71;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="glass">
    <img src="images/logo.jpg" width="100"><br><br>
    <h2 style="color:white;">Welcome to PickleSpotPH</h2>

    <button onclick="goLogin()">Login</button>
  </div>
</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
