<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f4f6f9;
    }

    .hero {
      background: linear-gradient(135deg, #3498db, #2ecc71);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .card p {
      font-size: 13px;
      color: #555;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #3498db;
      color: white;
    }

    .secondary {
      background: #2ecc71;
      color: white;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>PickleSpotPH</h1>
  <p>Book your pickleball court in seconds</p>
</div>

<div class="container">

  <!-- PLAYER -->
  <div class="card">
    <h3>🏓 Book a Court</h3>
    <p>Reserve your slot quickly and pay securely</p>
    <button class="primary" onclick="goPlayer()">Start Booking</button>
  </div>

  <!-- OWNER -->
  <div class="card">
    <h3>🏢 Court Owner</h3>
    <p>Manage bookings and track earnings</p>
    <button class="secondary" onclick="goOwner()">Owner Dashboard</button>
  </div>

  <div class="footer">
    © 2026 PickleSpotPH
  </div>

</div>

<script>
function goPlayer() {
  window.location.href = "player.html";
}

function goOwner() {
  window.location.href = "owner.html";
}
</script>

</body>
</html>
