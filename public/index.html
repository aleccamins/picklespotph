<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background:#f4f6f9;
    }

    .hero {
      background:linear-gradient(135deg,#3498db,#2ecc71);
      color:white;
      padding:40px 20px;
      text-align:center;
    }

    .hero h1 { margin:0; font-size:28px; }
    .hero p { margin:10px 0; }

    .cta-buttons {
      margin-top:20px;
    }

    .cta-buttons button {
      padding:12px 18px;
      border:none;
      border-radius:10px;
      margin:5px;
      font-weight:bold;
      cursor:pointer;
    }

    .book-btn { background:white; color:#3498db; }
    .login-btn { background:#2ecc71; color:white; }

    .container {
      max-width:420px;
      margin:auto;
      padding:15px;
    }

    .section-title {
      font-weight:bold;
      margin-bottom:10px;
    }

    .court-card {
      background:white;
      border-radius:12px;
      overflow:hidden;
      margin-bottom:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);
    }

    .court-img {
      width:100%;
      height:140px;
      object-fit:cover;
    }

    .content {
      padding:12px;
    }

    .price {
      color:#2ecc71;
      font-weight:bold;
    }

    .badge {
      font-size:11px;
      background:#eafaf1;
      color:#27ae60;
      padding:4px 6px;
      border-radius:6px;
      display:inline-block;
      margin-top:5px;
    }

    .slots {
      font-size:12px;
      margin-top:6px;
      color:#555;
    }

    .card-btn {
      margin-top:10px;
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
      font-weight:bold;
    }

    .owner {
      background:#2ecc71;
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>PickleSpotPH</h1>
  <p>Book pickleball courts instantly</p>

  <div class="cta-buttons">
    <button class="book-btn" onclick="goPlayer()">🏓 Book Now</button>
    <button class="login-btn" onclick="goOwner()">Owner Login</button>
  </div>
</div>

<div class="container">

  <div class="section-title">Available Courts Today</div>

  <div id="courts"></div>

</div>

<script>
async function loadCourts() {
  const res = await fetch("/courts");
  const courts = await res.json();

  const bookingsRes = await fetch("/bookings");
  const bookings = await bookingsRes.json();

  const container = document.getElementById("courts");
  container.innerHTML = "";

  const today = new Date().toISOString().split("T")[0];

  courts.forEach(court => {

    const todayBookings = bookings.filter(b =>
      b.date === today &&
      b.courtName === court.name &&
      (b.status === "Paid" || b.status === "Approved")
    );

    const taken = todayBookings.map(b => b.time);

    const allSlots = [
      "8:00 AM","9:00 AM","10:00 AM",
      "11:00 AM","12:00 PM","1:00 PM",
      "2:00 PM","3:00 PM","4:00 PM",
      "5:00 PM","6:00 PM","7:00 PM"
    ];

    const available = allSlots.filter(t => !taken.includes(t));
    const preview = available.slice(0,3).join(", ") || "Fully booked";

    const card = document.createElement("div");
    card.className = "court-card";

    card.innerHTML = `
      <img class="court-img" src="https://images.unsplash.com/photo-1616627981686-8a1c4a0b6c8f?auto=format&fit=crop&w=800&q=60">

      <div class="content">
        <div><b>${court.name}</b></div>
        <div class="price">₱${court.price}/hr</div>

        <div class="badge">
          ${available.length ? "Available Today" : "Fully Booked"}
        </div>

        <div class="slots">
          Next slots: ${preview}
        </div>

        <button class="card-btn" onclick="book('${court.name}')">
          Book Now
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

function goPlayer() {
  window.location.href = "player.html";
}

function goOwner() {
  window.location.href = "owner.html";
}

function book(court) {
  localStorage.setItem("selectedCourt", court);
  window.location.href = "player.html";
}

loadCourts();
</script>

</body>
</html>
