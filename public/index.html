<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .container { width:90%; margin:auto; }
    h2 { margin-top:30px; }

    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding:8px 12px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .approve { background:green; color:white; }
    .reject { background:red; color:white; }
  </style>
</head>

<body>
<div class="container">
  <h1>PickleSpotPH Dashboard</h1>

  <h2>Courts</h2>
  <div id="courts"></div>

  <h2>Bookings</h2>
  <div id="bookings"></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
