<!DOCTYPE html>
<html>
<head>
  <title>My Bookings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }

    .container {
      max-width:420px;
      margin:auto;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .status {
      font-size:12px;
      margin-top:5px;
    }

    .approved { color:green; }
    .pending { color:orange; }
    .rejected { color:red; }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>My Bookings</h2>
  <div id="list"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>
const name = localStorage.getItem("playerName");

async function load() {
  const res = await fetch("/bookings");
  const bookings = await res.json();

  const my = bookings.filter(b => b.user === name);

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (my.length === 0) {
    container.innerHTML = "No bookings yet";
    return;
  }

  my.reverse().forEach(b => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${b.date}</b><br>
      ${b.time} (${b.duration} hr)
      <div class="status ${b.status.toLowerCase()}">
        ${b.status}
      </div>
    `;

    container.appendChild(div);
  });
}

function goBack() {
  window.location.href = "player.html";
}

load();
</script>

</body>
</html>
