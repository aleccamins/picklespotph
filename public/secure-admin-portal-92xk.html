<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: relative;
    }

    .logout {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #e74c3c;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: white;
      border: none;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 15px;
    }

    .section {
      margin-bottom: 25px;
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #3498db;
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .analytics-btn {
      background: #2ecc71;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 25px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGOUT -->
  <button class="logout" onclick="logout()">Logout</button>

  <!-- 📊 ANALYTICS BUTTON -->
  <button class="analytics-btn" onclick="goAnalytics()">
    View Analytics 📊
  </button>

  <div class="section">
    <h2>Add Court</h2>

    <label>Court Name</label>
    <input id="courtName" placeholder="Enter court name">

    <button onclick="addCourt()">Add Court</button>
  </div>

  <hr>

  <div class="section">
    <h2>Add Owner</h2>

    <label>Username</label>
    <input id="username" placeholder="Enter username">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password">

    <label>Select Court</label>
    <select id="court"></select>

    <button onclick="addOwner()">Add Owner</button>
  </div>

</div>

<script>
// 🔐 PROTECT PAGE
const token = localStorage.getItem("adminToken");

if (!token) {
  alert("Access denied");
  window.location.href = "admin-login.html";
}

// 🔓 LOGOUT
function logout() {
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

// 📊 NAVIGATE TO ANALYTICS
function goAnalytics() {
  window.location.href = "analytics.html";
}

// LOAD COURTS
async function loadCourts() {
  const res = await fetch("/courts");
  const courts = await res.json();

  const select = document.getElementById("court");
  select.innerHTML = "";

  courts.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.innerText = c.name;
    select.appendChild(opt);
  });
}

// ADD COURT
async function addCourt() {
  const name = document.getElementById("courtName").value;

  if (!name) {
    alert("Enter court name");
    return;
  }

  const res = await fetch("/add-court", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": token
    },
    body: JSON.stringify({ name })
  });

  const msg = await res.text();
  alert(msg);

  document.getElementById("courtName").value = "";
  loadCourts();
}

// ADD OWNER
async function addOwner() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const court = document.getElementById("court").value;

  if (!username || !password) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/add-owner", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": token
    },
    body: JSON.stringify({ username, password, court })
  });

  const msg = await res.text();
  alert(msg);

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

// INIT
loadCourts();
</script>

</body>
</html>
