<!DOCTYPE html>
<html>
<head>
  <title>Earnings</title>
</head>

<body>

<h2>Earnings</h2>

<div id="daily"></div>
<div id="monthly"></div>

<script>
const RATE = 100;

async function load() {
  const res = await fetch("/bookings");
  const data = await res.json();

  const approved = data.filter(b => b.status === "Approved");

  const daily = {};
  const monthly = {};

  approved.forEach(b => {
    const amount = b.duration * RATE;

    daily[b.date] = (daily[b.date] || 0) + amount;

    const month = b.date.slice(0,7);
    monthly[month] = (monthly[month] || 0) + amount;
  });

  document.getElementById("daily").innerHTML =
    "<h3>Daily</h3>" +
    Object.entries(daily).map(d => `${d[0]} - ₱${d[1]}`).join("<br>");

  document.getElementById("monthly").innerHTML =
    "<h3>Monthly</h3>" +
    Object.entries(monthly).map(d => `${d[0]} - ₱${d[1]}`).join("<br>");
}

load();
</script>

</body>
</html>
