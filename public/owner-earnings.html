<!DOCTYPE html>
<html>
<head>
  <title>Owner Earnings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }

    .container {
      max-width:420px;
      margin:auto;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .total {
      font-size:20px;
      color:#2ecc71;
      font-weight:bold;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>💰 Earnings Dashboard</h2>

  <div class="card">
    Total Revenue:
    <div class="total" id="total">₱0</div>
  </div>

  <div class="card">
    Approved Bookings:
    <div id="count">0</div>
  </div>

  <div id="list"></div>

  <button onclick="back()">Back</button>

</div>

<script>
const RATE = 100;

async function load() {
  const res = await fetch("/bookings");
  const bookings = await res.json();

  const approved = bookings.filter(b => b.status === "Approved");

  const total = approved.reduce((sum, b) => {
    return sum + (b.duration * RATE);
  }, 0);

  document.getElementById("total").innerText = "₱" + total;
  document.getElementById("count").innerText = approved.length;

  const list = document.getElementById("list");
  list.innerHTML = "";

  approved.reverse().forEach(b => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${b.user}</b><br>
      ${b.date} ${b.time}<br>
      ₱${b.duration * RATE}
    `;

    list.appendChild(div);
  });
}

function back() {
  window.location.href = "owner.html";
}

load();
</script>

</body>
</html>
