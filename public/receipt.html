<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
</head>

<body>

<h2>Receipt</h2>

<div id="details"></div>

<script>
const d = JSON.parse(localStorage.getItem("receipt"));

document.getElementById("details").innerHTML = `
Name: ${d.name}<br>
Date: ${d.date}<br>
Time: ${d.time}<br>
Duration: ${d.duration}<br>
Total: ₱${d.total}
`;
</script>

</body>
</html>
