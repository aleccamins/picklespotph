<!DOCTYPE html>
<html>
<head>
  <title>PickleSpotPH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .player {
      background: #3498db;
      color: white;
    }

    .owner {
      background: #2ecc71;
      color: white;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>PickleSpotPH</h1>
    <p>Login as:</p>

    <button class="player" onclick="location.href='player.html'">
      👤 Player
    </button>

    <button class="owner" onclick="location.href='owner.html'">
      🏢 Owner
    </button>
  </div>

</body>
</html>
